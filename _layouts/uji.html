<!DOCTYPE html>
<html lang="en" data-uji-data-url="{{ '/ujis/data.json' | relative_url }}">

<head>
  {% include layout/head.html %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>my-family-chart</title>

  <script src="https://unpkg.com/d3@6"></script>
  <script type="module" src="https://unpkg.com/family-chart@0.7.0"></script>
  <link rel="stylesheet" href="https://unpkg.com/family-chart@0.7.0/dist/styles/family-chart.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--background);
    }

    .uji-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #FamilyChart {
      flex: 1;
      width: 100%;
      min-height: 0;
      background-color: rgb(96, 125, 139);
      color: #fff;
    }
  </style>
</head>

<body>
  {% include layout/header.html %}

  <div class="uji-container">
    <div id="FamilyChart" class="f3"></div>
  </div>

  <script type="module" src="{{ '/_scripts/uji.js' | relative_url }}"></script>

  {% include layout/footer.html %}
</body>

</html>
